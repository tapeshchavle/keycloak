spring:
  application:
    name: inventory-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/company}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/company}/protocol/openid-connect/certs
server:
  port: ${SERVER_PORT:8084}
management:
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
logging:
  level:
    com.company.inventory: DEBUG
    org.springframework.security: INFO
