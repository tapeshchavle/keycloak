# ============================================================
#  ENTERPRISE IAM STACK
#  Keycloak 25 | osixia/openldap | PostgreSQL 16
#  Payroll | HR | Inventory | phpLDAPadmin
# ============================================================

services:

  # ── PostgreSQL 16 — Keycloak persistence backend ──────────
  postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Keycloak@Secure2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── OpenLDAP 1.5 (osixia) — Enterprise User Directory ─────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "Company Enterprise"
      LDAP_DOMAIN: "company.com"
      LDAP_BASE_DN: "dc=company,dc=com"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-LdapAdmin@2024}
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD: "readonly123"
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
      - ./openldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    ports:
      - "389:389"
      - "636:636"
    command: ["--copy-service", "--loglevel", "warning"]
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -H ldap://localhost -x -b 'dc=company,dc=com' -D 'cn=admin,dc=company,dc=com' -w $${LDAP_ADMIN_PASSWORD:-LdapAdmin@2024} '(objectclass=*)' dn 2>/dev/null | grep -q 'dn:' && echo OK"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── phpLDAPadmin — LDAP Web UI ─────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8090:80"
    depends_on:
      - openldap
    networks:
      - iam-network

  # ── Keycloak 25 — OIDC/OAuth2 Authorization Server ─────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-Keycloak@Secure2024}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-Admin@Secure2024}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_HTTP_ENABLED: "true"
      KC_PROXY: passthrough
    volumes:
      - ./keycloak/realm-export:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iam-network

  # ── Keyclock App — Main Spring Boot API Gateway ─────────────
  keyclock-app:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: keyclock-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/company
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KC_CLIENT_ID: spring-api
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET:-spring-api-secret-2024}
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - iam-network
    profiles:
      - apps

  # ── Payroll Service — Port 8082 ────────────────────────────
  payroll-service:
    build:
      context: ../services/payroll-service
      dockerfile: Dockerfile
    container_name: payroll-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/company
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - iam-network
    profiles:
      - apps

  # ── HR Service — Port 8083 ─────────────────────────────────
  hr-service:
    build:
      context: ../services/hr-service
      dockerfile: Dockerfile
    container_name: hr-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/company
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - iam-network
    profiles:
      - apps

  # ── Inventory Service — Port 8084 ──────────────────────────
  inventory-service:
    build:
      context: ../services/inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/company
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - iam-network
    profiles:
      - apps

volumes:
  postgres_data:
    driver: local
  openldap_data:
    driver: local
  openldap_config:
    driver: local

networks:
  iam-network:
    driver: bridge
